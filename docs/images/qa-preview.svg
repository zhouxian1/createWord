<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">智能问答页面预览占位图</title>
<desc id="desc">用于 README 的智能问答页面截图占位图，可替换为真实截图。</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#071120"/>
    <stop offset="100%" stop-color="#132645"/>
  </linearGradient>
</defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<rect x="48" y="44" width="1184" height="632" rx="24" fill="#081529" stroke="#2d6fb3" stroke-opacity="0.5"/>
<rect x="86" y="86" width="1108" height="86" rx="18" fill="#0c223f"/>
<rect x="86" y="210" width="720" height="408" rx="18" fill="#09192f" stroke="#2d6fb3" stroke-opacity="0.45"/>
<rect x="836" y="210" width="358" height="408" rx="18" fill="#0c223f"/>
<rect x="132" y="260" width="410" height="88" rx="18" fill="#123055"/>
<rect x="350" y="378" width="410" height="110" rx="18" fill="#183d67"/>
<rect x="132" y="520" width="560" height="54" rx="14" fill="#10294d"/>
<circle cx="734" cy="546" r="22" fill="#6df7c1"/>
<rect x="874" y="260" width="282" height="70" rx="14" fill="#123055"/>
<rect x="874" y="358" width="282" height="70" rx="14" fill="#123055"/>
<rect x="874" y="456" width="282" height="120" rx="14" fill="#10294d"/>
<text x="116" y="128" fill="#eef6ff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">智能问答与语音输入</text>
<text x="116" y="156" fill="#93a9c5" font-size="16" font-family="Segoe UI, Arial, sans-serif">README 展示占位图 - 问答页面</text>
<text x="154" y="312" fill="#eef6ff" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">用户提问</text>
<text x="372" y="442" fill="#eef6ff" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">系统回答</text>
<text x="152" y="554" fill="#93a9c5" font-size="16" font-family="Segoe UI, Arial, sans-serif">支持文本输入、语音输入、答案溯源与知识库限定</text>
<text x="874" y="244" fill="#eef6ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">侧边信息</text>
<text x="900" y="304" fill="#93a9c5" font-size="16" font-family="Segoe UI, Arial, sans-serif">知识库选择</text>
<text x="900" y="402" fill="#93a9c5" font-size="16" font-family="Segoe UI, Arial, sans-serif">语音状态</text>
<text x="900" y="502" fill="#93a9c5" font-size="16" font-family="Segoe UI, Arial, sans-serif">答案来源与引用片段</text>
</svg>
