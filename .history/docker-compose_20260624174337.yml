version: '3.8'

services:
  # ===== MinIO 对象存储 =====
  minio:
    image: minio/minio:latest
    container_name: doc-gen-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== 后端服务 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-gen-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-doc-gen-system}
      - MINIO_SECURE=false
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - LOCAL_LLM_HOST=${LOCAL_LLM_HOST:-localhost}
      - LOCAL_LLM_PORT=${LOCAL_LLM_PORT:-8000}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-Qwen2.5-14B-Instruct}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/prod.db}
    volumes:
      - backend_data:/app/data
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== 前端服务（Nginx） =====
  frontend:
    image: nginx:alpine
    container_name: doc-gen-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - doc-gen-network

volumes:
  minio_data:
    driver: local
  backend_data:
    driver: local

networks:
  doc-gen-network:
    driver: bridge
