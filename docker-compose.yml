services:
  # ===== PostgreSQL 关系型数据库 =====
  postgres:
    image: postgres:16-alpine
    container_name: doc-gen-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doc_gen}
      POSTGRES_USER: ${POSTGRES_USER:-docgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docgen123456}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docgen} -d ${POSTGRES_DB:-doc_gen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== Redis 缓存 & 消息队列 =====
  redis:
    image: redis:7-alpine
    container_name: doc-gen-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== ChromaDB 向量数据库 =====
  chromadb:
    image: chromadb/chroma:latest
    container_name: doc-gen-chromadb
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== Neo4j 图数据库 =====
  neo4j:
    image: neo4j:5.22-community
    container_name: doc-gen-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j123456}
      - NEO4J_dbms_security_auth__minimum__password__length=8
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1024m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== MinIO 对象存储 =====
  minio:
    image: minio/minio:latest
    container_name: doc-gen-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== Celery 异步任务Worker =====
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-gen-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-docgen}:${POSTGRES_PASSWORD:-docgen123456}@postgres:5432/${POSTGRES_DB:-doc_gen}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123456}@redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-doc-gen-system}
      - MINIO_SECURE=false
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123456}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - LLM_API_BASE=${LLM_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== 后端服务 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-gen-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      # 数据库
      - DATABASE_URL=postgresql://${POSTGRES_USER:-docgen}:${POSTGRES_PASSWORD:-docgen123456}@postgres:5432/${POSTGRES_DB:-doc_gen}
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123456}@redis:6379/0
      # ChromaDB
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # MinIO
      - STORAGE_TYPE=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-doc-gen-system}
      - MINIO_SECURE=false
      # Neo4j
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123456}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen-plus}
      - LOCAL_LLM_HOST=${LOCAL_LLM_HOST:-localhost}
      - LOCAL_LLM_PORT=${LOCAL_LLM_PORT:-8000}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-Qwen2.5-14B-Instruct}
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - doc-gen-network

  # ===== 前端服务（Nginx） =====
  frontend:
    image: nginx:alpine
    container_name: doc-gen-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - doc-gen-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chromadb_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  minio_data:
    driver: local
  backend_data:
    driver: local

networks:
  doc-gen-network:
    driver: bridge
